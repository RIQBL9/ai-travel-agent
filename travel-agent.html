<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Agent</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0E1A; }
    input, select, textarea { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #1E2D45; border-radius: 4px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { transform:scale(0.8); opacity:0.4; } 50% { transform:scale(1.2); opacity:1; } }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .result-card { animation: fadeUp 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const TYPE_COLORS = {
      Food: "#FF6B6B", Culture: "#4ECDC4", Adventure: "#FFE66D", Nightlife: "#A855F7", Nature: "#6BCB77",
    };

    const TRIP_TYPES = [
      { id: "flights", label: "Flights only", icon: "✈️" },
      { id: "flights+hotel", label: "Flights + Hotel", icon: "🏨" },
      { id: "multicity", label: "Multi-city", icon: "🗺️" },
    ];

    function buildSystemPrompt(tripType) {
      const base = `You are an expert travel agent AI. Return ONLY a valid JSON object — no markdown, no preamble, no explanation.`;
      if (tripType === "flights") {
        return base + `
The JSON structure must be:
{
  "destination": "City, Country",
  "summary": "2-3 sentence description",
  "flights": [{ "airline": "...", "route": "XXX → YYY", "price": "£XXX pp", "duration": "Xh Xm", "tip": "..." }],
  "experiences": [{ "name": "...", "type": "Food|Culture|Adventure|Nightlife|Nature", "price": "£XX or Free", "description": "one sentence", "url": "https://www.tripadvisor.com/Search?q=NAME+DESTINATION" }],
  "tips": ["tip1","tip2","tip3"],
  "hotels": [],
  "multiCity": []
}
Return 3 flights, 4 experiences. You must determine and include correct IATA codes in the route field (e.g. MAN → IST). The destination field may include a specific hotel name or area preference.`;
      }
      if (tripType === "flights+hotel") {
        return base + `
The JSON structure must be:
{
  "destination": "City, Country",
  "summary": "2-3 sentence description",
  "packages": [
    {
      "label": "e.g. Budget Pick / Best Value / Luxury Choice / Early Bird",
      "flight": { "airline": "...", "route": "XXX → YYY", "duration": "Xh Xm", "flightPrice": "£XXX pp" },
      "hotel": { "name": "...", "area": "Neighbourhood", "stars": 4, "hotelPrice": "£XXX/night", "highlight": "..." },
      "totalEstimate": "£XXX pp total (flight + X nights hotel)"
    }
  ],
  "experiences": [{ "name": "...", "type": "Food|Culture|Adventure|Nightlife|Nature", "price": "£XX or Free", "description": "one sentence", "url": "https://www.tripadvisor.com/Search?q=NAME+DESTINATION" }],
  "tips": ["tip1","tip2","tip3"],
  "flights": [],
  "hotels": [],
  "multiCity": []
}
Return 5 packages (mix of budget, value and quality). Each package pairs a specific flight with a hotel. You must include correct IATA codes in route fields. If user specified a hotel name, prioritise it.`;
      }
      if (tripType === "multicity") {
        return base + `
The JSON structure must be:
{
  "destination": "Multi-city Trip",
  "summary": "2-3 sentence overview",
  "multiCity": [
    {
      "city": "City, Country",
      "nights": 3,
      "flight": { "airline": "...", "route": "XXX → YYY", "price": "£XXX pp", "duration": "Xh Xm" },
      "hotel": { "name": "...", "area": "...", "stars": 4, "price": "£XXX/night" },
      "mustDo": "One thing not to miss"
    }
  ],
  "tips": ["tip1","tip2","tip3"],
  "flights": [], "hotels": [], "experiences": []
}
Plan 3 cities. Determine correct IATA codes yourself and include them in routes.`;
      }
    }

    const CHAT_SYSTEM = `You are a helpful travel assistant refining existing trip results. Return ONLY a valid JSON object in the exact same structure. Update only the parts the user asks about. No markdown, no preamble.`;

    function buildSearchUrls(form, hotelName, flightRoute) {
      const iataMatch = (flightRoute || "").match(/([A-Z]{3})\s*[\u2192>-]+\s*([A-Z]{3})/);
      const fromIata = iataMatch ? iataMatch[1] : "";
      const toIata = iataMatch ? iataMatch[2] : "";
      const toSky = (d) => d ? d.replace(/-/g, "").slice(2) : "";
      const outDate = toSky(form.checkIn);
      const retDate = toSky(form.checkOut);
      const adults = form.adults || "2";
      const childCount = parseInt(form.children) || 0;
      const childAges = childCount > 0 ? "&" + Array(childCount).fill("children_ages=5").join("&") : "";

      const flightUrl = (fromIata && toIata && outDate && retDate)
        ? `https://www.skyscanner.net/transport/flights/${fromIata.toLowerCase()}/${toIata.toLowerCase()}/${outDate}/${retDate}/?adults=${adults}&children=${childCount}${childAges}`
        : `https://www.skyscanner.net`;

      const hotelUrl = `https://www.google.com/travel/search?q=${encodeURIComponent(hotelName || form.destination)}`;

      return { flightUrl, hotelUrl };
    }

    function App() {
      const [form, setForm] = useState({
        destination: "", departure: "Manchester", checkIn: "", checkOut: "", adults: "2", children: "0", budget: "mid", tripType: "flights+hotel",
      });
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [activeTab, setActiveTab] = useState("packages");
      const [chatInput, setChatInput] = useState("");
      const [chatLoading, setChatLoading] = useState(false);
      const [chatHistory, setChatHistory] = useState([]);
      const chatBottomRef = useRef(null);

      useEffect(() => { chatBottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chatHistory, chatLoading]);

      function setF(k, v) { setForm(f => ({ ...f, [k]: v })); }

      const nights = form.checkIn && form.checkOut
        ? Math.max(0, Math.round((new Date(form.checkOut) - new Date(form.checkIn)) / 86400000)) : null;

      async function callAI(systemPrompt, userContent) {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 3000,
            system: systemPrompt,
            messages: [{ role: "user", content: userContent }],
          }),
        });
        const data = await res.json();
        if (data.error) throw new Error("API error: " + data.error.message);
        const text = data.content?.map(c => c.text || "").join("") || "";
        const cleaned = text.replace(/```json|```/g, "").trim();
        const start = cleaned.indexOf("{");
        const end = cleaned.lastIndexOf("}");
        if (start === -1 || end === -1) throw new Error("No JSON in response");
        return JSON.parse(cleaned.slice(start, end + 1));
      }

      async function search() {
        if (!form.destination || !form.checkIn || !form.checkOut) { setError("Fill in destination and dates first."); return; }
        setError(""); setLoading(true); setResult(null); setChatHistory([]);
        try {
          const parsed = await callAI(buildSystemPrompt(form.tripType), `Find travel options:
Destination: ${form.destination}
Trip type: ${form.tripType}
Departure: ${form.departure}
Check-in: ${form.checkIn}, Check-out: ${form.checkOut}
Adults: ${form.adults}, Children: ${form.children}
Budget: ${form.budget === "budget" ? "Budget" : form.budget === "mid" ? "Mid-range" : "Luxury"}`);
          setResult(parsed);
          setActiveTab(form.tripType === "multicity" ? "multicity" : form.tripType === "flights+hotel" ? "packages" : "flights");
        } catch (e) { setError("Error: " + e.message); console.error(e); }
        setLoading(false);
      }

      async function sendChat() {
        const msg = chatInput.trim();
        if (!msg || chatLoading || !result) return;
        setChatInput("");
        const newHistory = [...chatHistory, { role: "user", content: msg }];
        setChatHistory(newHistory);
        setChatLoading(true);
        try {
          const parsed = await callAI(
            CHAT_SYSTEM + "\n\n" + buildSystemPrompt(form.tripType),
            `Current results: ${JSON.stringify(result)}\nUser request: "${msg}"\nTrip type: ${form.tripType}`
          );
          setResult(parsed);
          setChatHistory([...newHistory, { role: "assistant", content: `✅ Updated! "${msg}"` }]);
        } catch (e) {
          setChatHistory([...newHistory, { role: "assistant", content: "❌ Couldn't update. Try rephrasing." }]);
        }
        setChatLoading(false);
      }

      const inputStyle = { width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "12px 14px", color: "#fff", fontSize: 14, fontFamily: "'Outfit', sans-serif" };
      const labelStyle = { fontSize: 11, letterSpacing: "0.1em", color: "#4A6080", textTransform: "uppercase", display: "block", marginBottom: 6 };

      const tabs = result
        ? form.tripType === "multicity" ? ["multicity","tips"]
        : form.tripType === "flights" ? ["flights","experiences","tips"]
        : ["packages","experiences","tips"]
        : [];

      const tabIcons = { flights: "✈️", packages: "📦", experiences: "🎯", tips: "💡", multicity: "🗺️" };

      const Card = ({ href, children, delay }) => (
        <a href={href} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
          <div className="card result-card" style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "18px 20px", cursor: "pointer", transition: "all 0.2s", animationDelay: `${delay||0}s`, opacity: 0 }}>
            {children}
          </div>
        </a>
      );

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #0A0E1A 0%, #0D1525 60%, #0A1020 100%)", color: "#E2E8F0", fontFamily: "'Outfit', sans-serif", padding: "0 16px 48px" }}>

          <div style={{ maxWidth: 700, margin: "0 auto", paddingTop: 40, paddingBottom: 24, textAlign: "center" }}>
            <div style={{ fontSize: 11, letterSpacing: "0.25em", color: "#F6AD55", textTransform: "uppercase", marginBottom: 10 }}>✈ AI Travel Agent</div>
            <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px,5vw,48px)", fontWeight: 800, margin: 0, lineHeight: 1.1, background: "linear-gradient(135deg, #fff 30%, #F6AD55)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Where to next?</h1>
            <p style={{ color: "#4A6080", fontSize: 13, marginTop: 8 }}>Tell us where you're headed — we'll find the deals.</p>
          </div>

          <div style={{ maxWidth: 700, margin: "0 auto 28px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, padding: "24px" }}>
            <div style={{ marginBottom: 20 }}>
              <label style={labelStyle}>Trip Type</label>
              <div style={{ display: "flex", gap: 8 }}>
                {TRIP_TYPES.map(t => (
                  <button key={t.id} onClick={() => setF("tripType", t.id)} style={{
                    flex: 1, padding: "10px 8px", borderRadius: 10,
                    border: `1.5px solid ${form.tripType === t.id ? "rgba(246,173,85,0.5)" : "rgba(255,255,255,0.07)"}`,
                    background: form.tripType === t.id ? "rgba(246,173,85,0.1)" : "rgba(255,255,255,0.02)",
                    color: form.tripType === t.id ? "#F6AD55" : "#4A6080", fontSize: 12, fontWeight: 600,
                    fontFamily: "'Outfit', sans-serif", cursor: "pointer", transition: "all 0.2s",
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                  }}>
                    <span style={{ fontSize: 18 }}>{t.icon}</span><span>{t.label}</span>
                  </button>
                ))}
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <div>
                <label style={labelStyle}>Destination / Hotel</label>
                <input value={form.destination} onChange={e => setF("destination", e.target.value)} placeholder="e.g. Istanbul, Hilton Istanbul..." style={inputStyle} />
              </div>
              <div>
                <label style={labelStyle}>Departing From</label>
                <input value={form.departure} onChange={e => setF("departure", e.target.value)} placeholder="e.g. Manchester, London..." style={inputStyle} />
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <div>
                <label style={labelStyle}>Check-in</label>
                <input type="date" value={form.checkIn} onChange={e => setF("checkIn", e.target.value)} style={{ ...inputStyle, colorScheme: "dark" }} />
              </div>
              <div>
                <label style={labelStyle}>Check-out {nights ? <span style={{ color: "#F6AD55" }}>({nights} nights)</span> : ""}</label>
                <input type="date" value={form.checkOut} onChange={e => setF("checkOut", e.target.value)} style={{ ...inputStyle, colorScheme: "dark" }} />
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
              <div>
                <label style={labelStyle}>Adults</label>
                <select value={form.adults} onChange={e => setF("adults", e.target.value)} style={{ ...inputStyle, background: "#0D1525" }}>
                  {[1,2,3,4,5,6,7,8].map(n => <option key={n} value={n}>{n} {n===1?"adult":"adults"}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Children</label>
                <select value={form.children} onChange={e => setF("children", e.target.value)} style={{ ...inputStyle, background: "#0D1525" }}>
                  {[0,1,2,3,4,5,6].map(n => <option key={n} value={n}>{n===0?"No children":`${n} ${n===1?"child":"children"}`}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Budget</label>
                <select value={form.budget} onChange={e => setF("budget", e.target.value)} style={{ ...inputStyle, background: "#0D1525" }}>
                  <option value="budget">💰 Budget</option>
                  <option value="mid">✈️ Mid-range</option>
                  <option value="luxury">👑 Luxury</option>
                </select>
              </div>
            </div>

            {error && <p style={{ color: "#FC8181", fontSize: 13, marginBottom: 12, marginTop: -8 }}>{error}</p>}

            <button onClick={search} disabled={loading} style={{
              width: "100%", padding: "14px", borderRadius: 12, border: "none",
              background: loading ? "#1A2535" : "linear-gradient(135deg, #F6AD55, #ED8936)",
              color: loading ? "#4A6080" : "#0A0E1A", fontSize: 15, fontWeight: 700,
              fontFamily: "'Outfit', sans-serif", cursor: loading ? "default" : "pointer",
              transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>
              {loading
                ? <><div style={{ width:16, height:16, border:"2px solid #4A6080", borderTopColor:"#F6AD55", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />Searching...</>
                : "🔍 Find My Trip"}
            </button>
          </div>

          {result && (
            <div style={{ maxWidth: 700, margin: "0 auto", animation: "fadeUp 0.5s ease" }}>
              <div style={{ background: "rgba(246,173,85,0.08)", border: "1px solid rgba(246,173,85,0.2)", borderRadius: 16, padding: "18px 22px", marginBottom: 16 }}>
                <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Playfair Display', serif", marginBottom: 4 }}>📍 {result.destination}</div>
                <p style={{ fontSize: 13, color: "#94A3B8", margin: 0, lineHeight: 1.6 }}>{result.summary}</p>
              </div>

              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {tabs.map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)} style={{
                    flex: 1, padding: "9px 4px", borderRadius: 10,
                    border: `1px solid ${activeTab===tab ? "rgba(246,173,85,0.4)" : "rgba(255,255,255,0.06)"}`,
                    background: activeTab===tab ? "rgba(246,173,85,0.1)" : "rgba(255,255,255,0.02)",
                    color: activeTab===tab ? "#F6AD55" : "#4A6080", fontSize: 11, fontWeight: 600,
                    fontFamily: "'Outfit', sans-serif", cursor: "pointer", textTransform: "capitalize", transition: "all 0.2s",
                  }}>{tabIcons[tab]} {tab}</button>
                ))}
              </div>

              {activeTab === "flights" && (
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {result.flights?.map((f,i) => {
                    const urls = buildSearchUrls(form, null, f.route);
                    return (
                      <div key={i} className="card result-card" style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:"18px 20px", transition:"all 0.2s", animationDelay:`${i*0.1}s`, opacity:0 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                          <div>
                            <div style={{ fontWeight:700, fontSize:15, color:"#fff", marginBottom:4 }}>{f.airline}</div>
                            <div style={{ fontSize:13, color:"#4A6080" }}>{f.route} · {f.duration}</div>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontWeight:800, fontSize:18, color:"#F6AD55" }}>{f.price}</div>
                            <div style={{ fontSize:11, color:"#2D4A6B" }}>per person</div>
                          </div>
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <span style={{ fontSize:12, color:"#4ECDC4", background:"rgba(78,205,196,0.1)", padding:"3px 10px", borderRadius:20 }}>{f.tip}</span>
                          <a href={urls.flightUrl} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none", fontSize:12, fontWeight:600, color:"#F6AD55", background:"rgba(246,173,85,0.1)", border:"1px solid rgba(246,173,85,0.25)", padding:"4px 12px", borderRadius:20 }}>✈️ Skyscanner →</a>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {activeTab === "packages" && (
                <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                  {result.packages?.map((pkg,i) => {
                    const urls = buildSearchUrls(form, pkg.hotel?.name, pkg.flight?.route);
                    return (
                      <div key={i} className="result-card" style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:16, padding:"20px", animationDelay:`${i*0.1}s`, opacity:0 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                          <span style={{ fontSize:12, fontWeight:700, color:"#F6AD55", background:"rgba(246,173,85,0.12)", border:"1px solid rgba(246,173,85,0.25)", padding:"4px 12px", borderRadius:20 }}>{pkg.label}</span>
                          <div style={{ fontWeight:800, fontSize:17, color:"#F6AD55" }}>{pkg.totalEstimate}</div>
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, padding:"10px 14px", background:"rgba(255,255,255,0.02)", borderRadius:10 }}>
                          <div>
                            <div style={{ fontSize:10, letterSpacing:"0.1em", color:"#4A6080", textTransform:"uppercase", marginBottom:3 }}>✈️ Flight</div>
                            <div style={{ fontWeight:600, fontSize:14, color:"#fff" }}>{pkg.flight?.airline} · {pkg.flight?.route}</div>
                            <div style={{ fontSize:12, color:"#4A6080" }}>{pkg.flight?.duration}</div>
                          </div>
                          <div style={{ fontWeight:700, fontSize:15, color:"#4ECDC4" }}>{pkg.flight?.flightPrice} <span style={{ fontSize:11, color:"#2D4A6B" }}>pp</span></div>
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, padding:"10px 14px", background:"rgba(255,255,255,0.02)", borderRadius:10 }}>
                          <div>
                            <div style={{ fontSize:10, letterSpacing:"0.1em", color:"#4A6080", textTransform:"uppercase", marginBottom:3 }}>🏨 Hotel</div>
                            <div style={{ fontWeight:600, fontSize:14, color:"#fff" }}>{pkg.hotel?.name}</div>
                            <div style={{ fontSize:12, color:"#4A6080" }}>📍 {pkg.hotel?.area} · {"⭐".repeat(Math.min(pkg.hotel?.stars||3,5))}</div>
                          </div>
                          <div style={{ fontWeight:700, fontSize:15, color:"#A855F7" }}>{pkg.hotel?.hotelPrice} <span style={{ fontSize:11, color:"#2D4A6B" }}>/ night</span></div>
                        </div>
                        {pkg.hotel?.highlight && (
                          <div style={{ fontSize:12, color:"#94A3B8", marginBottom:14, padding:"8px 12px", background:"rgba(255,255,255,0.02)", borderRadius:8 }}>💬 {pkg.hotel.highlight}</div>
                        )}
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                          <a href={urls.flightUrl} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }}>
                            <div style={{ padding:"12px", borderRadius:10, background:"linear-gradient(135deg, rgba(246,173,85,0.15), rgba(237,137,54,0.1))", border:"1px solid rgba(246,173,85,0.3)", textAlign:"center", cursor:"pointer" }}>
                              <div style={{ fontSize:14, fontWeight:700, color:"#F6AD55" }}>✈️ Skyscanner</div>
                              <div style={{ fontSize:10, color:"#8A6A30", marginTop:2 }}>Dates + passengers pre-filled</div>
                            </div>
                          </a>
                          <a href={urls.hotelUrl} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }}>
                            <div style={{ padding:"12px", borderRadius:10, background:"linear-gradient(135deg, rgba(78,205,196,0.15), rgba(78,205,196,0.08))", border:"1px solid rgba(78,205,196,0.3)", textAlign:"center", cursor:"pointer" }}>
                              <div style={{ fontSize:14, fontWeight:700, color:"#4ECDC4" }}>🏨 Google Hotels</div>
                              <div style={{ fontSize:10, color:"#2D6B6B", marginTop:2 }}>Search hotel by name</div>
                            </div>
                          </a>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {activeTab === "experiences" && (
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {result.experiences?.map((e,i) => (
                    <Card key={i} href={e.url} delay={i*0.1}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div style={{ flex:1 }}>
                          <span style={{ fontSize:11, fontWeight:600, color:TYPE_COLORS[e.type]||"#fff", background:`${TYPE_COLORS[e.type]||"#fff"}18`, padding:"2px 10px", borderRadius:20, display:"inline-block", marginBottom:6 }}>{e.type}</span>
                          <div style={{ fontWeight:700, fontSize:15, color:"#fff", marginBottom:4 }}>{e.name}</div>
                          <div style={{ fontSize:13, color:"#94A3B8" }}>{e.description}</div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0, marginLeft:12 }}>
                          <div style={{ fontWeight:700, fontSize:15, color:"#F6AD55" }}>{e.price}</div>
                          <div style={{ fontSize:12, color:"#F6AD55", marginTop:6 }}>Explore →</div>
                        </div>
                      </div>
                    </Card>
                  ))}
                </div>
              )}

              {activeTab === "multicity" && (
                <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                  {result.multiCity?.map((city,i) => {
                    const urls = buildSearchUrls(form, city.hotel?.name, city.flight?.route);
                    return (
                      <div key={i} className="result-card" style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:16, padding:"20px", animationDelay:`${i*0.1}s`, opacity:0 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                          <div style={{ fontWeight:700, fontSize:17, color:"#fff" }}>📍 {city.city}</div>
                          <span style={{ fontSize:12, color:"#F6AD55", background:"rgba(246,173,85,0.1)", padding:"3px 10px", borderRadius:20 }}>{city.nights} nights</span>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
                          <a href={urls.flightUrl} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }}>
                            <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"12px", cursor:"pointer" }}>
                              <div style={{ fontSize:11, color:"#4A6080", marginBottom:4 }}>✈️ FLIGHT</div>
                              <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{city.flight?.airline}</div>
                              <div style={{ fontSize:12, color:"#4A6080" }}>{city.flight?.route} · {city.flight?.duration}</div>
                              <div style={{ fontSize:14, fontWeight:700, color:"#F6AD55", marginTop:4 }}>{city.flight?.price}</div>
                            </div>
                          </a>
                          <a href={urls.hotelUrl} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }}>
                            <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"12px", cursor:"pointer" }}>
                              <div style={{ fontSize:11, color:"#4A6080", marginBottom:4 }}>🏨 HOTEL</div>
                              <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{city.hotel?.name}</div>
                              <div style={{ fontSize:12, color:"#4A6080" }}>📍 {city.hotel?.area} · {"⭐".repeat(Math.min(city.hotel?.stars||3,5))}</div>
                              <div style={{ fontSize:14, fontWeight:700, color:"#F6AD55", marginTop:4 }}>{city.hotel?.price}</div>
                            </div>
                          </a>
                        </div>
                        {city.mustDo && <div style={{ fontSize:13, color:"#4ECDC4", background:"rgba(78,205,196,0.08)", padding:"8px 12px", borderRadius:8 }}>💡 Must do: {city.mustDo}</div>}
                      </div>
                    );
                  })}
                </div>
              )}

              {activeTab === "tips" && (
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {result.tips?.map((tip,i) => (
                    <div key={i} className="result-card" style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:"16px 20px", display:"flex", gap:12, alignItems:"flex-start", animationDelay:`${i*0.1}s`, opacity:0 }}>
                      <span style={{ color:"#F6AD55", fontSize:16, flexShrink:0 }}>💡</span>
                      <span style={{ fontSize:14, color:"#94A3B8", lineHeight:1.6 }}>{tip}</span>
                    </div>
                  ))}
                </div>
              )}

              <div style={{ marginTop:28, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:16, padding:"18px 20px" }}>
                <div style={{ fontSize:12, color:"#4A6080", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:12 }}>🤖 Refine your results</div>
                {chatHistory.length > 0 && (
                  <div style={{ maxHeight:180, overflowY:"auto", marginBottom:12, display:"flex", flexDirection:"column", gap:8 }}>
                    {chatHistory.map((m,i) => (
                      <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
                        <div style={{
                          maxWidth:"85%", padding:"8px 14px",
                          borderRadius: m.role==="user" ? "12px 12px 4px 12px" : "12px 12px 12px 4px",
                          background: m.role==="user" ? "rgba(246,173,85,0.12)" : "rgba(255,255,255,0.04)",
                          border: m.role==="user" ? "1px solid rgba(246,173,85,0.25)" : "1px solid rgba(255,255,255,0.06)",
                          fontSize:13, color: m.role==="user" ? "#F6AD55" : "#94A3B8", lineHeight:1.5,
                        }}>{m.content}</div>
                      </div>
                    ))}
                    {chatLoading && (
                      <div style={{ display:"flex" }}>
                        <div style={{ padding:"10px 14px", borderRadius:"12px 12px 12px 4px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", display:"flex", gap:4, alignItems:"center" }}>
                          {[0,1,2].map(j => <div key={j} style={{ width:5, height:5, borderRadius:"50%", background:"#F6AD55", animation:`pulse 1.2s ease ${j*0.2}s infinite` }} />)}
                        </div>
                      </div>
                    )}
                    <div ref={chatBottomRef} />
                  </div>
                )}
                <div style={{ display:"flex", gap:8 }}>
                  <input
                    value={chatInput}
                    onChange={e => setChatInput(e.target.value)}
                    onKeyDown={e => { if (e.key==="Enter") sendChat(); }}
                    placeholder='e.g. "hotels near Taksim" or "cheaper flights"'
                    style={{ flex:1, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"11px 14px", color:"#fff", fontSize:13, fontFamily:"'Outfit', sans-serif" }}
                  />
                  <button onClick={sendChat} disabled={!chatInput.trim()||chatLoading} style={{
                    width:42, height:42, borderRadius:10, border:"none", flexShrink:0,
                    cursor: chatInput.trim()&&!chatLoading ? "pointer" : "default",
                    background: chatInput.trim()&&!chatLoading ? "linear-gradient(135deg, #F6AD55, #ED8936)" : "#1A2535",
                    color: chatInput.trim()&&!chatLoading ? "#0A0E1A" : "#2D4A6B", fontSize:16, transition:"all 0.2s",
                  }}>↑</button>
                </div>
                <p style={{ fontSize:11, color:"#1E2D45", margin:"8px 0 0" }}>Ask to change area, price, hotel type, add experiences, swap cities...</p>
              </div>

              <p style={{ textAlign:"center", fontSize:11, color:"#1E2D45", marginTop:20 }}>Prices are indicative — always verify on booking sites.</p>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
